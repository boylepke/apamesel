<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#0A0818"/>
  <title>Storyo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0A0818;
      --bg2:    #130F26;
      --accent: #A78BFA;
      --gold:   #FCD34D;
      --text:   #E0E7FF;
      --muted:  #6B7DB3;
      --r: 220px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Baloo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at  7% 12%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 18% 35%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 28%  6%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 42% 22%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 14%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 68%  8%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 28%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 18%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 12% 62%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 25% 78%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 90%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 65% 85%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 72%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 90%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 50%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(2px 2px at  3% 48%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 47%  3%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 45%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 32% 52%, rgba(255,255,255,.5) 0%, transparent 100%);
    }
    @keyframes twinkle { 0%,100%{opacity:.4} 50%{opacity:1} }
    .stars::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(2px 2px at 20% 20%, rgba(167,139,250,.9) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 10%, rgba(167,139,250,.7) 0%, transparent 100%),
        radial-gradient(2px 2px at 85% 65%, rgba(167,139,250,.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 80%, rgba(167,139,250,.6) 0%, transparent 100%);
      animation: twinkle 3s ease-in-out infinite;
    }

    .scene {
      position: relative;
      width: 100vmin;
      height: 100vmin;
      max-width: 700px;
      max-height: 700px;
    }

    .orbit-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: calc(var(--r) * 2);
      height: calc(var(--r) * 2);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,.12);
      animation: ringPulse 6s ease-in-out infinite;
    }
    .orbit-ring::after {
      content: '';
      position: absolute; inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,.05);
    }
    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(167,139,250,0), 0 0 60px 20px rgba(100,60,200,.06); }
      50%      { box-shadow: 0 0 0 2px rgba(167,139,250,.06), 0 0 80px 30px rgba(100,60,200,.1); }
    }

    .center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      white-space: nowrap;
    }

    .app-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vmin, 2.6rem);
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .02em;
      filter: drop-shadow(0 0 14px rgba(167,139,250,.35));
      line-height: 1;
      margin-bottom: 6px;
    }

    .app-tagline {
      font-size: clamp(.55rem, 1.7vmin, .7rem);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 14px;
    }

    .remember {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: clamp(.48rem, 1.4vmin, .62rem);
      color: var(--muted); font-weight: 600;
      background: rgba(167,139,250,.08);
      border: 1px solid rgba(167,139,250,.18);
      border-radius: 20px;
      padding: 5px 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background .15s;
    }
    .remember:hover { background: rgba(167,139,250,.16); }
    .remember input { accent-color: var(--accent); width: 12px; height: 12px; cursor: pointer; }

    .flag-btn {
      position: absolute;
      top: 50%; left: 50%;
      width: clamp(48px, 9vmin, 66px);
      height: clamp(48px, 9vmin, 66px);
      border-radius: 50%;
      border: none;
      background: var(--bg2);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      box-shadow: 0 0 0 1.5px rgba(167,139,250,.2), 0 4px 20px rgba(0,0,0,.5);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s, background .15s;
      z-index: 20;
      animation: fadeIn .6s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes fadeIn { from{opacity:0;transform:translate(-50%,-50%) scale(.6)} to{opacity:1} }

    .flag-btn:hover {
      background: rgba(167,139,250,.15);
      box-shadow: 0 0 0 2px rgba(167,139,250,.5), 0 8px 32px rgba(100,60,200,.35);
      z-index: 30;
    }
    .flag-btn:active { transform: translate(-50%,-50%) scale(.91) !important; }

    .flag-emoji { font-size: clamp(18px, 4vmin, 26px); line-height: 1; }
    .flag-label {
      font-size: clamp(.42rem, 1.2vmin, .55rem);
      font-weight: 700; color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase; line-height: 1;
    }
    .flag-btn:hover .flag-label { color: var(--accent); }

    .flag-btn::after {
      content: attr(data-name);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: rgba(20,15,45,.95);
      border: 1px solid rgba(167,139,250,.25);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .7rem; font-weight: 700;
      color: var(--text); white-space: nowrap;
      pointer-events: none;
      opacity: 0; transition: opacity .15s;
    }
    .flag-btn:hover::after { opacity: 1; }

    @media (max-width: 480px)  { :root { --r: 130px; } }
    @media (min-width: 481px) and (max-width: 768px) { :root { --r: 175px; } }
    @media (min-width: 769px) { :root { --r: 220px; } }
  </style>
</head>
<body>

<div class="stars"></div>

<div class="scene" id="scene">

  <div class="orbit-ring"></div>

  <div class="center">
    <div class="app-title">Storyo</div>
    <div class="app-tagline">Voices of love</div>
    <label class="remember">
      <input type="checkbox" id="rememberMe" checked/>
      Megjegyez · Remember
    </label>
  </div>

  <button class="flag-btn" onclick="pick('hu')" data-name="Magyar"     ><span class="flag-emoji">🇭🇺</span><span class="flag-label">HU</span></button>
  <button class="flag-btn" onclick="pick('en')" data-name="English"    ><span class="flag-emoji">🇬🇧</span><span class="flag-label">EN</span></button>
  <button class="flag-btn" onclick="pick('de')" data-name="Deutsch"    ><span class="flag-emoji">🇩🇪</span><span class="flag-label">DE</span></button>
  <button class="flag-btn" onclick="pick('fr')" data-name="Français"   ><span class="flag-emoji">🇫🇷</span><span class="flag-label">FR</span></button>
  <button class="flag-btn" onclick="pick('it')" data-name="Italiano"   ><span class="flag-emoji">🇮🇹</span><span class="flag-label">IT</span></button>
  <button class="flag-btn" onclick="pick('es')" data-name="Español"    ><span class="flag-emoji">🇪🇸</span><span class="flag-label">ES</span></button>
  <button class="flag-btn" onclick="pick('nl')" data-name="Nederlands" ><span class="flag-emoji">🇳🇱</span><span class="flag-label">NL</span></button>
  <button class="flag-btn" onclick="pick('fi')" data-name="Suomi"      ><span class="flag-emoji">🇫🇮</span><span class="flag-label">FI</span></button>
  <button class="flag-btn" onclick="pick('no')" data-name="Norsk"      ><span class="flag-emoji">🇳🇴</span><span class="flag-label">NO</span></button>
  <button class="flag-btn" onclick="pick('sv')" data-name="Svenska"    ><span class="flag-emoji">🇸🇪</span><span class="flag-label">SV</span></button>
  <button class="flag-btn" onclick="pick('uk')" data-name="Українська" ><span class="flag-emoji">🇺🇦</span><span class="flag-label">UK</span></button>
  <button class="flag-btn" onclick="pick('zh')" data-name="中文"        ><span class="flag-emoji">🇨🇳</span><span class="flag-label">ZH</span></button>

</div>

<script>
  const saved = localStorage.getItem('storytime-lang');
  if (saved) window.location.replace('index_' + saved + '.html');

  function pick(lang) {
    if (document.getElementById('rememberMe').checked) {
      localStorage.setItem('storytime-lang', lang);
    }
    window.location.href = 'index_' + lang + '.html';
  }

  function positionFlags() {
    const scene = document.getElementById('scene');
    const btns  = scene.querySelectorAll('.flag-btn');
    const n     = btns.length;
    const r     = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--r')) || 220;
    const offset = -Math.PI / 2;
    btns.forEach((btn, i) => {
      const angle = offset + (2 * Math.PI * i) / n;
      const x = 50 + (r / scene.offsetWidth  * 100) * Math.cos(angle);
      const y = 50 + (r / scene.offsetHeight * 100) * Math.sin(angle);
      btn.style.left = x + '%';
      btn.style.top  = y + '%';
      btn.style.transform = 'translate(-50%, -50%)';
      btn.style.animationDelay = (i * 0.06) + 's';
    });
  }

  positionFlags();
  window.addEventListener('resize', positionFlags);
</script>
</body>
</html>
