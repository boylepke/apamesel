/* ── IndexedDB storage (no 5 MB quota — handles large audio & images) ── */
const storage = (() => {
  const DB_NAME = "storytime-db";
  const STORE   = "kv";
  let _db = null;

  const getDB = () => new Promise((resolve, reject) => {
    if (_db) { resolve(_db); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = e => reject(e.target.error);
  });

  const tx = async (mode, fn) => {
    const db    = await getDB();
    const store = db.transaction(STORE, mode).objectStore(STORE);
    return new Promise((resolve, reject) => {
      const req = fn(store);
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
  };

  return {
    get:    async (key)        => { const v = await tx("readonly",  s => s.get(key));      return v !== undefined ? { value: v } : null; },
    set:    async (key, value) => { await tx("readwrite", s => s.put(String(value), key)); return { value }; },
    delete: async (key)        => { await tx("readwrite", s => s.delete(key));             return { deleted: true }; },
  };
})();

/* ── Audio utilities ── */
function b64ToAB(b64) {
  const bin = atob(b64.split(",")[1]);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8.buffer;
}

function bufToWavUrl(buf) {
  const nc = buf.numberOfChannels, sr = buf.sampleRate, n = buf.length;
  const ds = n * nc * 2, ab = new ArrayBuffer(44 + ds), v = new DataView(ab);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+ds,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,nc,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*nc*2,true);
  v.setUint16(32,nc*2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,ds,true);
  let o = 44;
  for (let i = 0; i < n; i++) for (let c = 0; c < nc; c++) {
    const s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
    v.setInt16(o, s < 0 ? s * 32768 : s * 32767, true); o += 2;
  }
  return URL.createObjectURL(new Blob([ab], { type: "audio/wav" }));
}

async function concatToUrl(b64s) {
  if (!b64s?.length) return null;
  const AC = window.AudioContext || window.webkitAudioContext;
  const ctx = new AC();
  const bufs = (await Promise.all(
    b64s.map(b => ctx.decodeAudioData(b64ToAB(b)).catch(() => null))
  )).filter(Boolean);
  if (!bufs.length) { ctx.close(); return null; }
  const nc = bufs[0].numberOfChannels, sr = bufs[0].sampleRate;
  const total = bufs.reduce((a, b) => a + b.length, 0);
  const out = ctx.createBuffer(nc, total, sr);
  let off = 0;
  for (const b of bufs) {
    for (let c = 0; c < nc; c++) out.getChannelData(c).set(b.getChannelData(c), off);
    off += b.length;
  }
  ctx.close();
  return bufToWavUrl(out);
}

const getDur = b64 => new Promise(res => {
  const a = new Audio(); a.src = b64;
  a.onloadedmetadata = () => res(a.duration || 0);

// Shared illustration prompt (used by both providers)
const ILLUS_PROMPT = (title, desc) =>
  `Children's book illustration, dreamy painterly style inspired by Mary Blair and Beatrix Potter. ` +
  `Scene from the story "${title}": ${desc}. ` +
  `Soft watercolor textures, warm pastel palette with magical glows, charming rounded characters with large expressive eyes, ` +
  `rich layered background with atmospheric depth, detailed whimsical environment. No text in the image.`;

async function genSVG(desc, title, apiKey, provider) {
  if (!apiKey) return { error: "Kein API-Schlüssel — bitte im Admin-Bereich einrichten" };
  try {
    if (provider === "openai" || provider === "gpt-image-1") {
      // DALL-E 3 or gpt-image-1 — both use /v1/images/generations
      const model = provider === "gpt-image-1" ? "gpt-image-1" : "dall-e-3";
      const body = provider === "gpt-image-1"
        ? { model, prompt: ILLUS_PROMPT(title, desc), n: 1, size: "1024x1024",
            quality: "high", output_format: "webp" }
        : { model, prompt: ILLUS_PROMPT(title, desc), n: 1, size: "1024x1024",
            response_format: "b64_json" };
      const r = await fetch("https://api.openai.com/v1/images/generations", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (d.error) return { error: `API: ${d.error.code} — ${d.error.message}` };
      if (!r.ok)   return { error: `HTTP ${r.status}: ${d.error?.message || r.statusText}` };
      const b64 = d.data?.[0]?.b64_json ?? d.data?.[0]?.image;
      if (!b64) return { error: "OpenAI hat kein Bild gesendet" };
      const mime = provider === "gpt-image-1" ? "image/webp" : "image/png";
      return { svg: `<img src="data:${mime};base64,${b64}" style="width:100%;height:100%;object-fit:cover;display:block;"/>` };
    } else {
      // Claude: SVG illustration
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 4000,
          messages: [{ role: "user", content: `You are a master children's book illustrator in the tradition of Mary Blair and Beatrix Potter. Create a RICH, DETAILED SVG illustration (viewBox="0 0 600 400") for this scene from "${title}": "${desc}".

Technical requirements:
- Use <defs> with linearGradient and radialGradient elements for sky, ground, lighting
- Layer 6-10 distinct depth planes: distant sky → far background → mid background → midground → foreground → foreground details
- Characters must have: rounded body shapes, large expressive eyes with highlights (white dot), blush marks, distinctive silhouettes
- Environment: detailed ground texture, layered foliage or landscape, atmospheric perspective (lighter/hazier in distance)
- Lighting: define a clear light source with cast shadows (darker ellipses under objects), rim lighting on characters
- Magic/atmosphere: add 8-15 small glowing particles or sparkles using <circle> with radialGradient, subtle light rays using semi-transparent polygons
- Color: rich saturated palette with complementary accent colors, avoid flat fills — use gradients on every major shape
- Detail: add texture to surfaces (cross-hatched shadows, stippled ground, leaf clusters), small environmental storytelling props
- Composition: subject in rule-of-thirds position, leading lines drawing eye to focal point

NO text anywhere in the SVG. Reply with ONLY the complete SVG starting with <svg and ending with </svg>.` }]
        })
      });
      const d = await r.json();
      if (d.error) return { error: `API: ${d.error.type} — ${d.error.message}` };
      if (!r.ok)   return { error: `HTTP ${r.status}: ${d.error?.message || r.statusText}` };
      const text = d.content?.find(b => b.type === "text")?.text || "";
      const m = text.match(/<svg[\s\S]*<\/svg>/i);
      if (!m) return { error: "Das Modell antwortete, lieferte aber kein SVG" };
      return { svg: m[0] };
    }
  } catch (e) {
    return { error: `Netzwerkfehler: ${e.message}` };
  }
}

  const apiKeyRef = useRef("");
  useEffect(() => { apiKeyRef.current = apiKey; }, [apiKey]);
  const aiProviderRef = useRef("anthropic");
  useEffect(() => { aiProviderRef.current = aiProvider; }, [aiProvider]);

  // Keep illusRef in sync so fadeInSVG always reads the latest value,
  // even when called from the memoized checkScene (which has [] deps).
  useEffect(() => { illusRef.current = illus; }, [illus]);

  // Crossfade: old image fades out while new one fades in simultaneously
  const fadeInSVG = (svg) => {
    kbIdxRef.current = (kbIdxRef.current + 1) % 4;
    setKbClass(["kb1","kb2","kb3","kb4"][kbIdxRef.current]);
    setIllusPrev(illusRef.current);
    setIllusPrevOp(1);
    setIllus(svg);
    setIllusOp(0);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      setIllusOp(1);
      setIllusPrevOp(0);
    }));
  };
  // Ref so the memoized checkScene always calls the latest fadeInSVG
  const fadeInSVGRef = useRef(fadeInSVG);
  useEffect(() => { fadeInSVGRef.current = fadeInSVG; });

  const checkScene = useCallback(async (time) => {
    const story = pStoryRef.current;
    if (!story?.scenes?.length) return;
    const sorted = [...story.scenes].sort((a,b) => parseSec(a.time)-parseSec(b.time));
    let ai = -1;
    for (let i = 0; i < sorted.length; i++) if (time >= parseSec(sorted[i].time)) ai = i;
    setActiveSc(ai);
    if (ai === lastScRef.current) return;
    lastScRef.current = ai;
    if (ai === -1) return;
    const key = `${story.id}-${ai}`;
    // Check for uploaded image (stored separately, keyed by original scene index)
    const uploadedImg = sceneImgsRef.current[sorted[ai].imgIdx ?? ai];
    if (uploadedImg) {
      fadeInSVGRef.current(`<img src="${uploadedImg}" style="width:100%;height:100%;object-fit:cover;display:block;"/>`);
      return;
    }
    if (svgCacheRef.current[key]) { fadeInSVGRef.current(svgCacheRef.current[key]); return; }
    if (genRef.current) return;
    genRef.current = true; setGenIllus(true); setIllusError(null);
    try {
      const result = await genSVG(sorted[ai].desc, story.title, apiKeyRef.current, aiProviderRef.current);
      if (result.error) {
        lastScRef.current = -1;
        setIllusError(result.error);
      } else if (result.svg) {
        // Store in cache regardless of current scene position
        svgCacheRef.current = { ...svgCacheRef.current, [key]: result.svg };
        try { await storage.set("svg-cache", JSON.stringify(svgCacheRef.current)); } catch {}
        fadeInSVGRef.current(result.svg);
      }
    } catch (e) { lastScRef.current = -1; setIllusError(`Unexpected error: ${e.message}`); }
    genRef.current = false; setGenIllus(false);
  }, []);

  /* ── PIN ── */
  const openAdmin = () => { setPinInput(""); setPinError(false); setPinMode("enter"); setView("pin"); };
  const handlePinKey = (k) => {
    if (k === "⌫") { setPinInput(p => p.slice(0,-1)); setPinError(false); return; }
    const next = pinInput + k;
    setPinInput(next);
    if (next.length < 4) return;
    const err = () => { setPinError(true); setTimeout(() => { setPinInput(""); setPinError(false); }, 700); };
    if (pinMode === "enter") {
      if (next === appPin) { setPinInput(""); setView("admin"); }
      else err();
    } else if (pinMode === "change0") {
      if (next === appPin) { setPinMode("change1"); setPinInput(""); } else err();
    } else if (pinMode === "change1") {
      setPinNewBuf(next); setPinMode("change2"); setPinInput("");
    } else if (pinMode === "change2") {
      if (next === pinNewBuf) {
        setAppPin(next); storage.set("app-pin", next).catch(()=>{});
        setPinInput(""); setPinMode("enter"); setView("admin");
      } else { err(); setTimeout(() => setPinMode("change1"), 800); }
    }
  };

  /* ── Player ── */
  const openPlayer = async (story) => {
    setPStory(story); pStoryRef.current = story;
    setPLoading(true); setIllus(null); setIllusOp(0); setIllusPrev(null); setIllusPrevOp(0); setActiveSc(-1); setIllusError(null);
    lastScRef.current = -1; genRef.current = false; sceneImgsRef.current = [];
    setIsPlaying(false); setProgress(0); setCurTime(0); setAudioDur(0);
    try {
      const imgData = await storage.get(`scene-imgs:${story.id}`);
      if (imgData) sceneImgsRef.current = JSON.parse(imgData.value);
    } catch {}
    try {
      const sd = await storage.get(`segments:${story.id}`);
      if (sd) {
        const url = await concatToUrl(JSON.parse(sd.value));
        if (pUrlRef.current) URL.revokeObjectURL(pUrlRef.current);
        pUrlRef.current = url;
        if (audioRef.current && url) { audioRef.current.src = url; audioRef.current.load(); }
      }
    } catch (e) { console.error(e); }
    setPLoading(false);
  };

  const togglePlay = () => {
    const a = audioRef.current; if (!a) return;
    if (isPlaying) { a.pause(); setIsPlaying(false); } else { a.play(); setIsPlaying(true); }
  };

  const seek = (e) => {
    const a = audioRef.current; if (!a?.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    a.currentTime = (x / r.width) * a.duration;
    lastScRef.current = -1;
  };

  const closePlayer = () => {
    const a = audioRef.current; if (a) { a.pause(); a.src = ""; }
    setPStory(null); pStoryRef.current = null; setIsPlaying(false);
    setIllus(null); setIllusPrev(null); setIllusPrevOp(0);
    if (pUrlRef.current) { URL.revokeObjectURL(pUrlRef.current); pUrlRef.current = null; }
  };

  /* ── Editor ── */
  const openEditor = async (story = null) => {
    if (story) {
      setEdId(story.id); setEdTitle(story.title); setEdNar(story.narrator || "dad");
      setEdEmoji(story.emoji || "⭐"); setEdPal(story.colorIdx || 0);
      // Load saved scenes and reattach any uploaded images
      let scenes = story.scenes?.length ? story.scenes.map(s => ({ ...s, img: null })) : [{ time:"0:00", desc:"", img:null }];
      try {
        const imgData = await storage.get(`scene-imgs:${story.id}`);
        if (imgData) {
          const imgs = JSON.parse(imgData.value);
          scenes = scenes.map((sc, i) => ({ ...sc, img: imgs[i] || null }));
        }
      } catch {}
      setEdScenes(scenes);
      try {
        const sd = await storage.get(`segments:${story.id}`);
        if (sd) {
          const b64s = JSON.parse(sd.value);
          setEdSegs(await Promise.all(b64s.map(async b64 => ({ b64, dur: await getDur(b64) }))));
        } else setEdSegs([]);
      } catch { setEdSegs([]); }
    } else {
      setEdId(null); setEdTitle(""); setEdNar("dad"); setEdEmoji("⭐");
      setEdPal(0); setEdScenes([{ time:"0:00", desc:"", img:null }]); setEdSegs([]);
    }
    setView("editor");
  };

  const saveEditor = async () => {
    if (!edTitle.trim()) return;
    setEdSaving(true);
    const id = edId || `s${Date.now()}`;
    // A scene is valid if it has a timestamp AND either a description or an uploaded image
    const validScenes = edScenes
      .filter(s => s.time && (s.desc.trim() || s.img))
      .map((s, i) => ({ time: s.time, desc: s.desc, imgIdx: s.img ? i : null }));
    // Always write scene-imgs so removals are persisted (write nulls if no images)
    const sceneImgs = edScenes.map(s => s.img || null);
    await storage.set(`scene-imgs:${id}`, JSON.stringify(sceneImgs));
    const story = { id, title: edTitle.trim(), narrator: edNar, emoji: edEmoji, colorIdx: edPal, scenes: validScenes };
    const updated = edId ? stories.map(s => s.id === id ? story : s) : [...stories, story];
    const meta = updated.map(({ id, title, narrator, emoji, colorIdx, scenes }) => ({ id, title, narrator, emoji, colorIdx, scenes }));
    try {
      await storage.set("stories-meta", JSON.stringify(meta));
      if (edSegs.length) await storage.set(`segments:${id}`, JSON.stringify(edSegs.map(s => s.b64)));
      setStories(updated); setView("admin");
    } catch (e) { alert("Hiba:" + e.message); }
    setEdSaving(false);
  };

  const deleteStory = async (id, e) => {
    e.stopPropagation();
    if (!confirm("Diese Geschichte löschen?")) return;
    const updated = stories.filter(s => s.id !== id);
    await storage.set("stories-meta", JSON.stringify(
      updated.map(({ id,title,narrator,emoji,colorIdx,scenes }) => ({ id,title,narrator,emoji,colorIdx,scenes }))
    ));
    try { await storage.delete(`segments:${id}`); } catch {}
    try { await storage.delete(`scene-imgs:${id}`); } catch {}
    setStories(updated);
  };

  /* ── Export ── */
  const exportStory = async (story, e) => {
    e.stopPropagation();
    try {
      const segsData = await storage.get(`segments:${story.id}`);
      const segments = segsData ? JSON.parse(segsData.value) : [];
      const svgs = {};
      Object.entries(svgCacheRef.current).forEach(([k, v]) => {
        if (k.startsWith(`${story.id}-`)) svgs[k] = v;
      });
      const imgData = await storage.get(`scene-imgs:${story.id}`);
      const sceneImgs = imgData ? JSON.parse(imgData.value) : null;
      const bundle = {
        _type: "storybook/v1",
        exportedAt: new Date().toISOString(),
        meta: { title: story.title, narrator: story.narrator, emoji: story.emoji, colorIdx: story.colorIdx, scenes: story.scenes },
        segments, svgs, sceneImgs,
      };
      const json = JSON.stringify(bundle);
      const filename = `${story.title.replace(/[^a-z0-9]/gi,"_")}.storybook`;
      if (window.NativeIO) {
        // Android WebView: save via native bridge to Downloads folder
        window._exportDone = (ok, msg) => {
          delete window._exportDone;
          if (ok) alert("✅ In Downloads gespeichert:\n" + msg);
          else    alert("Exportfehler: " + msg);
        };
        window.NativeIO.saveFile(filename, json);
      } else {
        // Browser fallback
        const blob = new Blob([json], { type: "application/json" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = filename; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
    } catch (err) { alert("Exportfehler: " + err.message); }
  };

  /* ── Import ── */
  const handleImportFile = async (e) => {
    const file = e.target.files[0]; e.target.value = "";
    if (!file) return;
    setImporting(true);
    try {
      const text = await file.text();
      const bundle = JSON.parse(text);
      if (bundle._type !== "storybook/v1") throw new Error("Érvénytelen fájl");
      const id = `s${Date.now()}`;
      const story = { id, ...bundle.meta };
      const dup = stories.find(s => s.title === story.title);
      if (dup && !confirm(`"${story.title}" existiert bereits. Als Kopie importieren?`)) { setImporting(false); return; }
      const updated = [...stories, story];
      await storage.set("stories-meta", JSON.stringify(
        updated.map(({ id,title,narrator,emoji,colorIdx,scenes }) => ({ id,title,narrator,emoji,colorIdx,scenes }))
      ));
      if (bundle.segments?.length) await storage.set(`segments:${id}`, JSON.stringify(bundle.segments));
      if (bundle.sceneImgs) await storage.set(`scene-imgs:${id}`, JSON.stringify(bundle.sceneImgs));
      if (bundle.svgs) {
        const newSvgs = { ...svgCacheRef.current };
        Object.entries(bundle.svgs).forEach(([k, v]) => {
          const idx = k.split("-").slice(1).join("-");
          newSvgs[`${id}-${idx}`] = v;
        });
        svgCacheRef.current = newSvgs;
        try { await storage.set("svg-cache", JSON.stringify(newSvgs)); } catch {}
      }
      setStories(updated);
    } catch (err) { alert("Importfehler: " + err.message); }
    setImporting(false);
  };

  /* ── Native Android recording bridge ── */
  useEffect(() => {
    // Called by Kotlin when a native recording finishes
    window.nativeSegmentReady = async (replIdx) => {
      const b64 = window.NativeRecorder ? window.NativeRecorder.getLastSegment() : null;
      if (!b64) return;
      const dur = await getDur(b64);
      const seg = { b64, dur };
      if (replIdx >= 0) setEdSegs(prev => prev.map((s,i) => i === replIdx ? seg : s));
      else              setEdSegs(prev => [...prev, seg]);
      setIsRec(false); setRecReplIdx(null);
    };
    return () => { delete window.nativeSegmentReady; };
  }, []);

  /* ── Recording ── */
  const startRec = async (replIdx = null) => {
    // ── Native Android bridge (bypasses WebView getUserMedia restrictions) ──
    if (window.NativeRecorder) {
      setIsRec(true); setRecReplIdx(replIdx); setRecDown(SEG_MAX);
      window.NativeRecorder.start(replIdx !== null ? replIdx : -1);
      let c = SEG_MAX;
      countdownRef.current = setInterval(() => {
        c--; setRecDown(c);
        if (c <= 0) { clearInterval(countdownRef.current); window.NativeRecorder.stop(); }
      }, 1000);
      return;
    }
    // ── Web fallback (browser / GitHub Pages) ──
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const chunks = [];
      const mr = new MediaRecorder(stream);
      mrRef.current = mr;
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        clearInterval(countdownRef.current);
        const blob = new Blob(chunks, { type: mr.mimeType });
        const b64 = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(blob); });
        const dur = await getDur(b64);
        const seg = { b64, dur };
        if (replIdx !== null) setEdSegs(prev => prev.map((s,i) => i === replIdx ? seg : s));
        else setEdSegs(prev => [...prev, seg]);
        setIsRec(false); setRecReplIdx(null);
      };
      mr.start();
      setIsRec(true); setRecReplIdx(replIdx); setRecDown(SEG_MAX);
      let c = SEG_MAX;
      countdownRef.current = setInterval(() => {
        c--; setRecDown(c);
        if (c <= 0) { clearInterval(countdownRef.current); mr.stop(); }
      }, 1000);
    } catch { alert("Auf das Mikrofon konnte nicht zugegriffen werden."); }
  };

  const stopRec = () => {
    clearInterval(countdownRef.current);
    if (window.NativeRecorder) { window.NativeRecorder.stop(); return; }
    if (mrRef.current?.state === "recording") mrRef.current.stop();
  };

  const playSegPreview = (idx) => {
    if (prevAudioRef.current) { prevAudioRef.current.pause(); prevAudioRef.current = null; }

    a.play();
    a.onended = () => { setPrevSegIdx(null); prevAudioRef.current = null; };

          </CARD>

          <CARD>
            <LBL>EMOJI</LBL>
            <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:18 }}>
              {EMOJIS.map(e => (
                <span key={e} onClick={() => setEdEmoji(e)} style={{ fontSize:22, padding:"5px 6px", borderRadius:8, cursor:"pointer", background:edEmoji===e?"#EFF6FF":"transparent", outline:edEmoji===e?"2px solid #3B82F6":"none", transition:"background .1s" }}>{e}</span>
              ))}
            </div>

          </CARD>

          <CARD>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
              <div style={{ fontFamily:"'Fredoka One',cursive", color:"#1E293B", fontSize:"1.05rem" }}>🎙️ Tonaufnahme</div>
              {totalDur > 0 && <div style={{ fontSize:"0.72rem", color:"#94A3B8", fontWeight:700, background:"#F8FAFC", borderRadius:20, padding:"3px 9px" }}>{fmt(totalDur)} · {edSegs.length} seg{edSegs.length!==1?"s":""}</div>}
            </div>
            <div style={{ fontSize:"0.76rem", color:"#94A3B8", marginBottom:14, lineHeight:1.5 }}>
              Aufnahme in <strong style={{color:"#64748B"}}>30-Sekunden-Abschnitten</strong>. Fehler gemacht? Einfach diesen Abschnitt löschen.
            </div>

            {edSegs.length > 0 && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:14 }}>
                {edSegs.map((seg,i) => {
                  const replacing = isRec && recReplIdx === i;
                  const active = prevSegIdx === i;
                  return (
                    <div key={i} style={{ background:replacing?"#FEF2F2":active?"#EFF6FF":"#F8FAFC", border:`2px solid ${replacing?"#FCA5A5":active?"#93C5FD":"#E2E8F0"}`, borderRadius:12, padding:"9px 10px", display:"flex", flexDirection:"column", alignItems:"center", gap:3, minWidth:72 }}>
                      <div style={{ fontSize:"0.62rem", color:"#94A3B8", fontWeight:800 }}>#{i+1}</div>
                      <div style={{ fontSize:"0.88rem", fontWeight:800, color:"#334155" }}>{fmt(seg.dur)}</div>
                      <div style={{ display:"flex", gap:1, marginTop:1 }}>
                        <button onClick={() => playSegPreview(i)} className="iBtn" style={{ color:"#3B82F6" }}>{active?"⏹":"▶"}</button>
                        <button onClick={() => !isRec && startRec(i)} className="iBtn" disabled={isRec} style={{ color:"#F59E0B" }}>🔄</button>
                        <button onClick={() => !isRec && deleteSeg(i)} className="iBtn" disabled={isRec} style={{ color:"#EF4444" }}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {isRec ? (
              <div className={recDown <= 5 ? "blink-fast" : ""} style={{ display:"flex", alignItems:"center", gap:12, background:recDown<=5?"#FEE2E2":"#FFF5F5", border:`1.5px solid ${recDown<=5?"#EF4444":"#FCA5A5"}`, borderRadius:12, padding:"13px 14px" }}>
                <div className="blink" style={{ width:11, height:11, borderRadius:"50%", background:"#EF4444", flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:800, color:"#DC2626", fontSize:"0.88rem" }}>
                    {recReplIdx !== null ? `Neu aufnehmen... #${recReplIdx+1}` : `Aufnahme... #${edSegs.length+1}`}
                  </div>
                  <div style={{ height:5, background:"#FECACA", borderRadius:3, marginTop:7 }}>
                    <div style={{ height:"100%", width:`${((SEG_MAX-recDown)/SEG_MAX)*100}%`, background:"#EF4444", borderRadius:3, transition:"width 1s linear" }}/>
                  </div>
                  <div style={{ fontSize:"0.72rem", color:"#94A3B8", marginTop:4, fontWeight:600 }}>Noch {recDown}s</div>
                </div>
                <button onClick={stopRec} style={{ background:"#EF4444", color:"white", border:"none", borderRadius:9, padding:"9px 14px", fontWeight:800, fontSize:"0.82rem", flexShrink:0 }}>Fertig ✓</button>
              </div>
            ) : (
              <button onClick={() => startRec(null)} className="pressable" style={{ width:"100%", padding:"13px", borderRadius:12, border:"2px dashed #CBD5E1", background:"#F8FAFC", color:"#3B82F6", fontWeight:800, fontSize:"0.92rem", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                🎙️ Abschnitt {edSegs.length+1} aufnehmen
              </button>
            )}
          </CARD>

          <CARD>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
              <div style={{ fontFamily:"'Fredoka One',cursive", color:"#1E293B", fontSize:"1.05rem" }}>🎨 Illustrationen</div>
              <button onClick={() => setEdScenes(p => [...p,{time:"",desc:"",img:null}])} style={{ background:"#EFF6FF", color:"#3B82F6", border:"none", borderRadius:8, padding:"5px 11px", fontWeight:800, fontSize:"0.75rem" }}>+ Hinzufügen</button>
            </div>
            <div style={{ fontSize:"0.76rem", color:"#94A3B8", marginBottom:14, lineHeight:1.5 }}>
              Zeitstempel setzen, KI-Prompt schreiben oder eigenes Bild hochladen. 🖼️
            </div>
            {edScenes.map((sc,i) => (
              <div key={i} style={{ background:"#F8FAFC", borderRadius:12, border:"1px solid #E2E8F0", padding:"11px", marginBottom:10 }}>
                <div style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom: sc.img ? 8 : 0 }}>
                  <input value={sc.time} onChange={e => { const s=[...edScenes]; s[i]={...s[i],time:e.target.value}; setEdScenes(s); }} placeholder="0:30"
                    style={{ width:54, padding:"9px 5px", borderRadius:9, border:"2px solid #E2E8F0", background:"#FFFBEB", color:"#D97706", fontSize:"0.82rem", textAlign:"center", fontWeight:800, flexShrink:0 }}/>
                  <textarea value={sc.desc} onChange={e => { const s=[...edScenes]; s[i]={...s[i],desc:e.target.value}; setEdScenes(s); }}
                    placeholder="KI-Prompt schreiben oder eigenes Bild hochladen."
                    rows={2}
                    style={{ flex:1, padding:"9px 11px", borderRadius:9, border:"2px solid #E2E8F0", background:"white", color:"#334155", fontSize:"0.82rem", resize:"none", lineHeight:1.5 }}/>
                  {edScenes.length > 1 && (
                    <button onClick={() => setEdScenes(p => p.filter((_,j) => j!==i))} style={{ background:"none", border:"none", color:"#CBD5E1", fontSize:16, padding:"7px 3px", marginTop:3, flexShrink:0 }}>✕</button>
                  )}
                </div>
                {/* Image upload row */}
                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
                  {sc.img ? (
                    <>
                      <img src={sc.img} style={{ width:64, height:44, objectFit:"cover", borderRadius:7, border:"2px solid #3B82F6", flexShrink:0 }}/>
                      <div style={{ flex:1, fontSize:"0.72rem", color:"#3B82F6", fontWeight:700 }}>Eigenes Bild — wird in der Geschichte angezeigt.</div>
                      <button onClick={() => { const s=[...edScenes]; s[i]={...s[i],img:null}; setEdScenes(s); }}
                        style={{ background:"#FEF2F2", color:"#EF4444", border:"none", borderRadius:7, padding:"4px 9px", fontWeight:800, fontSize:"0.72rem", flexShrink:0 }}>Entfernen</button>
                    </>
                  ) : (
                    <>
                      <label style={{ flex:1, display:"flex", alignItems:"center", gap:6, background:"white", border:"1.5px dashed #CBD5E1", borderRadius:9, padding:"7px 11px", cursor:"pointer" }}>
                        <span style={{ fontSize:16 }}>🖼️</span>
                        <span style={{ fontSize:"0.75rem", color:"#94A3B8", fontWeight:700 }}>Eigenes Bild hochladen (optional)</span>
                        <input type="file" accept="image/*" style={{ display:"none" }} onChange={e => {
                          const file = e.target.files[0]; e.target.value = "";
                          if (!file) return;
                          const reader = new FileReader();
                          reader.onload = ev => { const s=[...edScenes]; s[i]={...s[i],img:ev.target.result}; setEdScenes(s); };
                          reader.readAsDataURL(file);
                        }}/>
                      </label>
                    </>
                  )}
                </div>
              </div>
            ))}
          </CARD>
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════════
     RENDER: PLAYER
  ══════════════════════════════════════════════════════════ */
  const renderPlayer = () => {
    if (!pStory) return null;
    const nc  = NAR[pStory.narrator || "dad"];
    const pal = PALETTES[pStory.colorIdx % PALETTES.length];
    const sorted = pStory.scenes?.length ? [...pStory.scenes].sort((a,b) => parseSec(a.time)-parseSec(b.time)) : [];
    return (
      <div className="anim-fade" onClick={closePlayer} style={{ position:"fixed", inset:0, background:"rgba(15,23,42,.93)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:16 }}>
        <div className="anim-pop" onClick={e => e.stopPropagation()} style={{ background:"white", borderRadius:32, overflow:"hidden", maxWidth:440, width:"100%", boxShadow:`0 0 0 3px ${nc.color}28, 0 0 70px ${nc.color}1A, 0 32px 80px rgba(0,0,0,.8)` }}>
          <div style={{height:5,background:`linear-gradient(90deg,${nc.color},${nc.glow},${nc.color})`}}/>

          <div style={{ width:"100%", height:260, background:`linear-gradient(160deg,${pal.bg},#F1F5F9)`, position:"relative", overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center" }}>
            {/* Background layer — previous image fading out */}
            {illusPrev && (
              <div dangerouslySetInnerHTML={{ __html: illusPrev }} className="illusWrap"
                style={{ position:"absolute", inset:0, opacity:illusPrevOp, transition:"opacity 1.4s ease", overflow:"hidden", zIndex:1 }}/>
            )}
            {/* Foreground layer — new image fading in */}
            {illus && (
              <div dangerouslySetInnerHTML={{ __html: illus }} className={`illusWrap ${kbClass}`}
                style={{ position:"absolute", inset:0, opacity:illusOp, transition:"opacity 1.4s ease", overflow:"hidden", zIndex:2 }}/>
            )}
            {/* Placeholder when no image yet */}
            {!illus && (
              <div style={{ textAlign:"center", padding:"0 16px", zIndex:3 }}>
                {pLoading
                  ? <div style={{ color:"rgba(255,255,255,.6)", fontWeight:700 }}>Audio wird vorbereitet...</div>
                  : illusError
                    ? <div>
                        <div style={{ color:"#FCA5A5", fontWeight:700, fontSize:"0.78rem", lineHeight:1.5, marginBottom:10 }}>⚠️ {illusError}</div>
                        <button onClick={() => { setIllusError(null); checkScene(audioRef.current?.currentTime || 0); }}
                          style={{ background:"rgba(255,255,255,.15)", color:"white", border:"1px solid rgba(255,255,255,.3)", borderRadius:20, padding:"6px 18px", fontWeight:800, fontSize:"0.8rem", cursor:"pointer" }}>
                          🔄 Erneut versuchen
                        </button>
                      </div>
                    : genIllus
                      ? <div className="blink" style={{ color:"rgba(255,255,255,.7)", fontWeight:800, fontSize:"0.9rem" }}>🎨 Bild wird gemalt...</div>
                      : <div className="float" style={{ fontSize:64 }}>{pStory.emoji}</div>
                }
              </div>
            )}
            {genIllus && illus && (
              <div className="blink" style={{ position:"absolute", bottom:8, right:10, background:"rgba(0,0,0,.55)", color:"white", fontSize:"0.68rem", borderRadius:20, padding:"3px 10px", fontWeight:800, zIndex:4 }}>🎨 Nächstes wird gemalt…</div>
            )}
            <button onClick={closePlayer} style={{ position:"absolute", top:10, right:10, background:"rgba(0,0,0,.4)", color:"white", border:"none", borderRadius:"50%", width:32, height:32, fontSize:15, zIndex:5 }}>✕</button>
          </div>

          <div style={{ padding:"16px 22px 22px" }}>
            <div style={{ textAlign:"center", marginBottom:14 }}>
              <div style={{ fontFamily:"'Fredoka One',cursive", fontSize:"1.55rem", color:"#1E293B", lineHeight:1.2 }}>{pStory.title}</div>
              <div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:nc.color,color:"white",borderRadius:20,padding:"3px 12px",fontSize:".7rem",fontWeight:700}}>{nc.icon} {nc.label}</div>
            </div>

            <div onClick={seek} onTouchStart={seek} style={{ height:9, background:"#F1F5F9", borderRadius:5, cursor:"pointer", overflow:"hidden", marginBottom:4 }}>
              <div style={{ height:"100%", width:progress+"%", background:`linear-gradient(90deg,${nc.color},${nc.glow})`, borderRadius:5, transition:"width .1s linear" }}/>
            </div>
            {sorted.length > 0 && audioDur > 0 && (
              <div style={{ position:"relative", height:6, marginBottom:3 }}>
                {sorted.map((sc,i) => (
                  <div key={i} title={sc.desc} style={{ position:"absolute", left:`${(parseSec(sc.time)/audioDur)*100}%`, top:0, width:2, height:6, background:`${nc.color}80`, borderRadius:2, transform:"translateX(-50%)" }}/>
                ))}
              </div>
            )}
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:"0.78rem", color:"#64748B", fontWeight:700, marginBottom:10 }}>
              <span>{fmt(curTime)}</span><span>{fmt(audioDur)}</span>
            </div>
            {sorted.length > 0 && (
              <div style={{ display:"flex", justifyContent:"center", gap:5, marginBottom:14 }}>
                {sorted.map((_,i) => (
                  <div key={i} style={{ width:activeSc===i?22:7, height:7, borderRadius:4, background:activeSc===i?nc.color:`${nc.color}3A`, transition:"all .35s ease" }}/>
                ))}
              </div>
            )}
            <div style={{ display:"flex", justifyContent:"center", gap:14, alignItems:"center" }}>
              <button onClick={() => { const a=audioRef.current; if(a){a.currentTime=Math.max(0,a.currentTime-10);lastScRef.current=-1;} }} style={{ width:50,height:50,borderRadius:"50%",background:"rgba(0,0,0,.08)",color:"#475569",border:"none",fontSize:20 }}>⏪</button>
              <button onClick={togglePlay} style={{ width:76,height:76,borderRadius:"50%",background:`linear-gradient(135deg,${nc.color},${nc.glow})`,color:"white",border:"none",fontSize:30,boxShadow:`0 6px 24px ${nc.color}60` }}>{isPlaying?"⏸":"▶"}</button>
              <button onClick={() => { const a=audioRef.current; if(a){a.currentTime=Math.min(a.duration||0,a.currentTime+10);lastScRef.current=-1;} }} style={{ width:50,height:50,borderRadius:"50%",background:"rgba(0,0,0,.08)",color:"#475569",border:"none",fontSize:20 }}>⏩</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <>
      <style>{CSS}</style>
      <audio ref={audioRef}/>
      {view === "main"   && renderMain()}
      {view === "pin"    && renderPin()}
      {view === "admin"  && renderAdmin()}
      {view === "editor" && renderEditor()}
      {pStory            && renderPlayer()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
